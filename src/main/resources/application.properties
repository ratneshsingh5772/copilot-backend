# ============================================================
# Application
# ============================================================
spring.application.name=copilot-backend
server.port=8081

# ============================================================
# MySQL DataSource
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/copilot_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=abc@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# Spring AI ? Vertex AI auto-config DISABLED (using Ollama locally instead)
# ============================================================
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.vertexai.gemini.VertexAiGeminiAutoConfiguration

# ============================================================
# LLM Microservice (Python FastAPI ? localhost:8001)
# ============================================================
# Base URL of the running FastAPI LLM service (cd llm-service && ./start.sh)
llm.service.base-url=http://localhost:8001
# Ollama model used by the FastAPI service (informational only ? configured in llm-service/.env)
ollama.model=llama3.2


# ============================================================
# SpringDoc / Swagger UI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ============================================================
# Logging
# ============================================================
logging.level.com.telecom.copilot_backend=INFO
logging.level.org.springframework.ai=DEBUG
